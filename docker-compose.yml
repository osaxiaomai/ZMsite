version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: zm-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: local
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    ports:
      - "10006:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db_init:/docker-entrypoint-initdb.d

  wordpress:
    depends_on:
      - db
    image: wordpress:6.2-php8.1-apache
    container_name: zm-wordpress
    restart: always
    ports:
      - "8001:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: root
      WORDPRESS_DB_NAME: local
    volumes:
      - ./wp-content:/var/www/html/wp-content

volumes:
  db_data:
